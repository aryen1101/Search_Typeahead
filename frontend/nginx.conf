server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---- Static frontend ---------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Reverse proxy to the backend API ---------------------------------
    # The browser calls same-origin /api/* and nginx forwards to the backend
    # service on the docker network. This avoids any CORS dependency and keeps
    # the API origin stable. The trailing slash on proxy_pass strips the /api
    # prefix, so /api/suggest -> http://backend:8080/suggest.
    location /api/ {
        proxy_pass         http://backend:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
